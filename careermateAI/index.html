<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
    <title>CareerMate AI</title>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <img class="logo-icon" src="assets/logo-icon.svg" alt="CareerMate AI Logo">
                <img class="logo-text" src="assets/logo-text.png" alt="CareerMate AI Logo">
            </div>
            <div class="nav-links">
                <a class="nav-link" href="#home">Features</a>
                <a class="nav-link" href="#contact">Demo</a>
            </div>
            <div class="nav-buttons">
                <a href="#signin" class="btn-signin">Sign In</a>
                <a href="#start" class="btn-start">Start for Free</a>
            </div>
        </div>


    </nav>
    <main>
        <section class="hero" id="home">
            <div class="hero-container">
                <div class="hero-content">
                    <h1 class="hero-title">Your AI Career Practice Partner</h1>
                    <p class="hero-description">Get job-ready with AI — from resumes to interviews, CareerMate AI coaches you step by step.</p>
                    <div class="hero-buttons">
                        <a href="#start" class="btn-hero-primary">Start for Free
                            <svg width="20" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                        <a href="#demo" class="btn-hero-secondary">Watch Demo
                            <svg width="20" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>
                <img class="hero-decoration" src="assets/arrow-cursor.webp" alt="CareerMate AI Hero Image">
            </div>


        </section>
    </main>
</body>

</html>
