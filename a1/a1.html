<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <style>
    /* ── Design tokens ── */
    :root {
      --bg-page:    #edf2f2;   /* light sage-gray page */
      --bg-input:   #dce8e7;   /* muted teal input fill */
      --accent:     #2e6b58;   /* dark forest green */
      --accent-hover: #1f4f40;
      --text-heading: #1c2830;
      --text-label:   #2c3a42;
      --text-muted:   #5a7070;
      --radius-input: 6px;
    }

    /* ── Reset & base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-label);
      background-color: var(--bg-page);
      padding: 40px 16px;
    }

    /* ── Page layout ── */
    main {
      display: flex;
      justify-content: center;
    }

    /* ── Form area (flat — no card elevation) ── */
    section {
      background-color: var(--bg-page);
      padding: 40px 36px;
      width: 100%;
      max-width: 580px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 32px;
      text-align: center;
    }

    /* ── Fieldset grouping ── */
    fieldset {
      border: none;
      padding: 0;
      margin-bottom: 28px;
    }

    /* Green dot before section legend */
    legend {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-heading);
      margin-bottom: 18px;
    }

    legend::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Individual field ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-label);
    }

    /* ── Inputs, select, textarea — borderless fill style ── */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: var(--radius-input);
      font-size: 0.95rem;
      color: var(--text-heading);
      background-color: var(--bg-input);
      outline: none;
      transition: background-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="date"]:focus,
    select:focus,
    textarea:focus {
      background-color: #cddedd;
      box-shadow: 0 0 0 2px var(--accent);
    }

    textarea {
      resize: vertical;
    }

    /* ── Gender radio group ── */
    #gender-label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-label);
      margin-bottom: 4px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .radio-label input[type="radio"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }

    /* ── Submit button ── */
    .form-actions {
      margin-top: 8px;
      text-align: center;
    }

    input[type="submit"] {
      padding: 11px 40px;
      background-color: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-input);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    input[type="submit"]:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    /* ── Responsive: narrow screens ── */
    @media (max-width: 480px) {
      section {
        padding: 28px 12px;
      }

      h1 {
        font-size: 1.4rem;
      }

      .radio-group {
        gap: 14px;
      }
    }
  </style>
</head>

<body>

  <!-- Page wrapper -->
  <main>

    <!-- Registration form card -->
    <section aria-labelledby="form-heading">
      <h1 id="form-heading">Sign Up</h1>

      <form action="#" method="post">

        <!-- ── Personal Information ── -->
        <fieldset>
          <legend>Your Basic Info</legend>

          <div class="field-group">
            <label for="first-name">First Name</label>
            <input
              type="text"
              id="first-name"
              name="first_name"
              placeholder="Jane"
              autocomplete="off"
              required
            />
          </div>

          <div class="field-group">
            <label for="last-name">Last Name</label>
            <input
              type="text"
              id="last-name"
              name="last_name"
              placeholder="Smith"
              autocomplete="off"
              required
            />
          </div>

          <div class="field-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="jane@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="field-group">
            <label for="dob">Date of Birth</label>
            <input
              type="date"
              id="dob"
              name="dob"
              autocomplete="bday"
              required
            />
          </div>

        </fieldset>

        <!-- ── Account Security ── -->
        <fieldset>
          <legend>Account Security</legend>

          <div class="field-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              minlength="8"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="field-group">
            <label for="confirm-password">Confirm Password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              minlength="8"
              autocomplete="new-password"
              required
            />
          </div>

        </fieldset>

        <!-- ── Profile ── -->
        <fieldset>
          <legend>Profile</legend>

          <!-- Gender radio group -->
          <div class="field-group">
            <p id="gender-label">Gender</p>
            <div class="radio-group" role="group" aria-labelledby="gender-label">

              <label class="radio-label">
                <input type="radio" name="gender" value="male" required />
                Male
              </label>

              <label class="radio-label">
                <input type="radio" name="gender" value="female" />
                Female
              </label>

              <label class="radio-label">
                <input type="radio" name="gender" value="other" />
                Other
              </label>

            </div>
          </div>

          <div class="field-group">
            <label for="profession">Choose Your Profession</label>
            <select id="profession" name="profession" required>
              <option value="" disabled selected>Select a profession…</option>
              <option value="web-dev">Web Development</option>
              <option value="data-analytics">Data Analytics</option>
              <option value="ui-ux">UI/UX Design</option>
              <option value="devops">DevOps</option>
              <option value="mobile-dev">Mobile Development</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="field-group">
            <label for="about">About Me</label>
            <textarea
              id="about"
              name="about"
              rows="5"
              placeholder="Tell us a little about yourself…"
              required
            ></textarea>
          </div>

        </fieldset>

        <!-- ── Submit ── -->
        <div class="form-actions">
          <input type="submit" value="Create Account" />
        </div>

      </form>
    </section>

  </main>

</body>
</html>
